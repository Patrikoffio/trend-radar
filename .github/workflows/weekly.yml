name: TrendRadar — Veckorapport

on:
  push:
    branches: [main]         # Tillfälligt: testkörning vid push — tas bort efter verifiering
  schedule:
    - cron: "0 18 * * 0"   # Söndag 18:00 UTC = 20:00 CEST (sommartid)
  workflow_dispatch:         # Manuell körning från GitHub-gränssnittet

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta kod
        uses: actions/checkout@v4

      - name: Sätt upp Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installera dependencies
        run: pip install -r requirements.txt

      - name: Verifiera secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          echo "RESEND_API_KEY set: $([[ -n "$RESEND_API_KEY" ]] && echo YES || echo NO)"
          echo "RECIPIENT_EMAIL set: $([[ -n "$RECIPIENT_EMAIL" ]] && echo YES || echo NO)"

      - name: Kör TrendRadar
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py 2>&1 | tee run.log

      - name: Spara run.log som artifact
        if: always()   # Sparar loggen även om steget ovan misslyckas
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_id }}
          path: run.log
          retention-days: 30
